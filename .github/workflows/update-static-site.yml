name: Update static site

on:
  push:
    branches:
      - main
    paths:
      - "templates/**"
      - "static/data/**"
      - "main.py"
      - "build_static.py"
      - "requirements.txt"
      - "An*lise.xlsx"
      - ".github/workflows/update-static-site.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build static site
        run: python build_static.py

      - name: Commit generated docs
        run: |
          if [ -z "$(git status --porcelain docs)" ]; then
            echo "No generated docs changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/ceara_municipios.csv docs/ceara_municipios.pdf docs/.nojekyll
          git commit -m "Update generated static site"
          git push
